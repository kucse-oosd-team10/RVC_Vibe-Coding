# -- SonarCloud Configuration --
sonar.organization=kucse-oosd-team10
sonar.projectKey=kucse-oosd-team10_RVC_Vibe-Coding
sonar.projectName=RVC_Vibe-Coding

# Source
sonar.sources=src,include
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C++ specifics
sonar.cfamily.compile-commands=build/dev/compile_commands.json

# Coverage (SonarCloud Generic Test Coverage XML)
sonar.coverageReportPaths=coverage-report/sonar-coverage.xml

# cppcheck external report
sonar.cxx.cppcheck.reportPaths=cppcheck-report.xml

# Exclusions
sonar.exclusions=build/**,coverage-report/**,bindings/**
sonar.test.inclusions=tests/**
